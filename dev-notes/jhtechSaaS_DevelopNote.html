<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jhtechSaaS — Develop Note</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css" id="hljs-light">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-dark" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f8fafc;
    --bg-tertiary: #f1f5f9;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-secondary: #475569;
    --text-muted: #64748b;
    --text-faint: #94a3b8;
    --accent: #2563eb;
    --accent-soft: #eff6ff;
    --accent-strong: #1d4ed8;
    --success: #16a34a;
    --warning: #d97706;
    --danger: #dc2626;
    --info: #0891b2;
    --code-bg: #f6f8fa;
    --code-text: #1f2328;
    --path-bg: #f1f5f9;
    --path-text: #64748b;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.04);
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.06);
    --sidebar-w: 320px;
    /* Typography scale - 명확한 위계 */
    --fs-xs: 11px;
    --fs-sm: 12px;
    --fs-base: 14px;
    --fs-md: 15px;
    --fs-lg: 16px;
    --fs-xl: 18px;
    --fs-2xl: 22px;
    --fs-3xl: 28px;
    --lh-tight: 1.35;
    --lh-base: 1.65;
    --lh-loose: 1.8;
  }
  [data-theme="dark"] {
    --bg: #0a0a0a;
    --bg-secondary: #111111;
    --bg-tertiary: #1a1a1a;
    --border: #262626;
    --border-strong: #404040;
    --text: #fafafa;
    --text-secondary: #d4d4d8;
    --text-muted: #a1a1aa;
    --text-faint: #71717a;
    --accent: #60a5fa;
    --accent-soft: #1e293b;
    --accent-strong: #93c5fd;
    --code-bg: #161b22;
    --code-text: #e6edf3;
    --path-bg: #1e293b;
    --path-text: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    font-feature-settings: "ss06" on, "cv11" on;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    word-break: keep-all;
    overflow-wrap: break-word;
  }
  .app { display: flex; height: 100vh; }

  /* ═══════════════ Sidebar ═══════════════ */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: var(--fs-xs);
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .sidebar-project {
    font-size: var(--fs-xl);
    font-weight: 700;
    color: var(--text);
    line-height: var(--lh-tight);
    word-break: keep-all;
  }
  .sidebar-stats {
    margin-top: 14px;
    display: flex;
    gap: 14px;
    font-size: var(--fs-sm);
    color: var(--text-muted);
  }
  .sidebar-stats span strong { color: var(--text-secondary); font-weight: 600; }

  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-tab {
    flex: 1;
    padding: 10px 8px;
    text-align: center;
    font-size: var(--fs-sm);
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none;
    border-top: 0;
    border-left: 0;
    border-right: 0;
    font-family: inherit;
  }
  .sidebar-tab:hover { color: var(--text); background: var(--bg-tertiary); }
  .sidebar-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  .search-box {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: var(--fs-sm);
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-list::-webkit-scrollbar { width: 8px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  .date-group { margin-bottom: 4px; }
  .date-header {
    display: flex; align-items: center; gap: 6px;
    padding: 9px 16px;
    cursor: pointer;
    user-select: none;
    font-size: var(--fs-sm);
    font-weight: 600;
    color: var(--text);
    transition: background 0.15s;
  }
  .date-header:hover { background: var(--bg-tertiary); }
  .date-toggle {
    display: inline-block;
    width: 12px; height: 12px;
    transition: transform 0.2s;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .date-group.collapsed .date-toggle { transform: rotate(-90deg); }
  .date-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .date-count {
    font-size: 10px;
    color: var(--text-muted);
    background: var(--bg-tertiary);
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .feature-list {
    list-style: none;
    overflow: hidden;
    max-height: 2000px;
    transition: max-height 0.25s ease;
  }
  .date-group.collapsed .feature-list { max-height: 0; }
  .feature-item {
    padding: 9px 16px 9px 36px;
    cursor: pointer;
    font-size: var(--fs-sm);
    color: var(--text-secondary);
    display: flex; align-items: center; gap: 8px;
    transition: background 0.12s, color 0.12s;
    border-left: 3px solid transparent;
    line-height: var(--lh-tight);
  }
  .feature-item:hover { background: var(--bg-tertiary); color: var(--text); }
  .feature-item.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 600;
  }
  .feature-type-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  .feature-type-badge.feat { background: #dcfce7; color: #166534; }
  .feature-type-badge.fix { background: #fee2e2; color: #991b1b; }
  .feature-type-badge.refactor { background: #fef3c7; color: #92400e; }
  .feature-type-badge.docs { background: #dbeafe; color: #1e40af; }
  .feature-type-badge.test { background: #f3e8ff; color: #6b21a8; }
  .feature-type-badge.chore { background: #f1f5f9; color: #475569; }
  .feature-type-badge.perf { background: #ccfbf1; color: #115e59; }
  .feature-type-badge.style { background: #fce7f3; color: #9d174d; }
  .feature-type-badge.build, .feature-type-badge.ci { background: #e0e7ff; color: #3730a3; }
  [data-theme="dark"] .feature-type-badge.feat { background: #14532d; color: #86efac; }
  [data-theme="dark"] .feature-type-badge.fix { background: #7f1d1d; color: #fca5a5; }
  [data-theme="dark"] .feature-type-badge.refactor { background: #78350f; color: #fcd34d; }
  [data-theme="dark"] .feature-type-badge.docs { background: #1e3a8a; color: #93c5fd; }
  [data-theme="dark"] .feature-type-badge.test { background: #581c87; color: #d8b4fe; }
  [data-theme="dark"] .feature-type-badge.chore { background: #1e293b; color: #cbd5e1; }
  [data-theme="dark"] .feature-type-badge.perf { background: #134e4a; color: #5eead4; }
  [data-theme="dark"] .feature-type-badge.style { background: #831843; color: #f9a8d4; }
  [data-theme="dark"] .feature-type-badge.build,
  [data-theme="dark"] .feature-type-badge.ci { background: #312e81; color: #a5b4fc; }
  .feature-title-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-footer {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px;
    color: var(--text-faint);
  }
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: var(--fs-xs);
    transition: all 0.15s;
  }
  .theme-toggle:hover { background: var(--bg-tertiary); color: var(--text); }

  /* ═══════════════ Main content ═══════════════ */
  .main {
    flex: 1;
    overflow-y: auto;
    background: var(--bg);
  }
  .main::-webkit-scrollbar { width: 10px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }

  .content {
    max-width: 920px;
    margin: 0 auto;
    padding: 48px 60px 96px;
  }

  .empty-state {
    height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }
  .empty-state h2 { font-size: var(--fs-2xl); font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; }
  .empty-state p { font-size: var(--fs-base); max-width: 460px; line-height: var(--lh-base); }

  /* ─── Feature header ─── */
  .feature-header { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
  .breadcrumb {
    font-size: var(--fs-sm);
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
    line-height: var(--lh-tight);
  }
  .breadcrumb-item { color: var(--text-muted); }
  .breadcrumb-sep { color: var(--border-strong); }
  .feature-h1 {
    font-size: var(--fs-3xl);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin-bottom: 18px;
    color: var(--text);
  }
  .meta-row {
    display: flex; flex-wrap: wrap; gap: 10px 16px;
    font-size: var(--fs-sm);
    color: var(--text-muted);
    align-items: center;
    line-height: var(--lh-tight);
  }
  .meta-row .status-badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: var(--fs-xs);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .status-badge.completed { background: #dcfce7; color: #166534; }
  .status-badge.in-progress { background: #fef3c7; color: #92400e; }
  .status-badge.blocked { background: #fee2e2; color: #991b1b; }
  [data-theme="dark"] .status-badge.completed { background: #14532d; color: #86efac; }
  [data-theme="dark"] .status-badge.in-progress { background: #78350f; color: #fcd34d; }
  [data-theme="dark"] .status-badge.blocked { background: #7f1d1d; color: #fca5a5; }

  .tags-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: var(--fs-xs);
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* ─── Section ─── */
  .section { margin-top: 40px; }
  .section-title {
    font-size: var(--fs-xs);
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
    line-height: var(--lh-tight);
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ─── Prose — 가독성 중심 ─── */
  .prose {
    line-height: var(--lh-base);
    color: var(--text);
    font-size: var(--fs-md);
  }
  .prose p { margin-bottom: 14px; }
  .prose p:last-child { margin-bottom: 0; }
  .prose strong { font-weight: 600; color: var(--text); }
  .prose em { color: var(--text-secondary); font-style: italic; }
  /* 인라인 코드 — 명확하게 구분되는 스타일 */
  .prose code, .card-row code, .claude-hint-body code, .prompt-text code {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.88em;
    border: 1px solid var(--border);
    font-weight: 500;
    word-break: break-all;
  }
  /* 파일 경로 — 별도의 부드러운 스타일 */
  .file-path {
    display: inline-block;
    background: var(--path-bg);
    color: var(--path-text);
    padding: 2px 8px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.82em;
    border: 1px solid var(--border);
    margin-top: 2px;
    word-break: break-all;
    line-height: 1.5;
  }
  .prose pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    overflow-x: auto;
    margin: 16px 0;
    font-size: 13px;
    line-height: 1.6;
  }
  .prose pre code {
    background: transparent;
    padding: 0;
    border: 0;
    color: var(--code-text);
    font-size: 13px;
  }
  /* 리스트 — 들여쓰기 명확하게 */
  .prose ul, .prose ol {
    margin: 10px 0 16px 0;
    padding-left: 28px;
  }
  .prose li {
    margin-bottom: 6px;
    line-height: var(--lh-base);
  }
  .prose li:last-child { margin-bottom: 0; }
  /* 중첩 리스트 더 깊이 들여쓰기 */
  .prose ul ul, .prose ul ol, .prose ol ul, .prose ol ol {
    margin: 6px 0 6px 0;
    padding-left: 24px;
  }
  .prose blockquote {
    border-left: 3px solid var(--accent);
    padding: 12px 18px;
    background: var(--bg-secondary);
    margin: 16px 0;
    color: var(--text-secondary);
    border-radius: 0 6px 6px 0;
    line-height: var(--lh-base);
  }
  .prose h3 { margin-top: 28px; margin-bottom: 12px; font-size: var(--fs-xl); font-weight: 600; line-height: var(--lh-tight); }
  .prose h4 { margin-top: 20px; margin-bottom: 10px; font-size: var(--fs-lg); color: var(--text-secondary); font-weight: 600; line-height: var(--lh-tight); }
  .prose a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  .prose a:hover { border-bottom-color: var(--accent); }

  /* ─── Code snippet ─── */
  .code-snippet {
    margin-top: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .code-snippet-header {
    background: var(--bg-tertiary);
    padding: 10px 16px;
    font-size: var(--fs-sm);
    color: var(--text-muted);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    line-height: var(--lh-tight);
  }
  .code-snippet pre { margin: 0; border: 0; border-radius: 0; }
  .code-snippet-caption {
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    font-size: var(--fs-sm);
    color: var(--text-muted);
    font-style: italic;
    line-height: var(--lh-base);
  }
  .copy-btn {
    background: none; border: 0; color: var(--text-muted); cursor: pointer;
    font-size: var(--fs-xs); font-family: inherit; padding: 3px 10px; border-radius: 4px;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--bg); color: var(--text); }

  /* ═══════════════ ADR / Problem cards — 들여쓰기 수정 ═══════════════ */
  .decision-card, .problem-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 16px;
    background: var(--bg-secondary);
  }
  .decision-card { border-left: 4px solid var(--info); }
  .problem-card { border-left: 4px solid var(--warning); }
  .card-title {
    font-size: var(--fs-lg);
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--text);
    line-height: var(--lh-tight);
  }
  /* 카드 내부 행 — 라벨과 값을 명확히 분리, 자식은 들여쓰기 */
  .card-row {
    margin-bottom: 12px;
    font-size: var(--fs-base);
    line-height: var(--lh-base);
    color: var(--text);
  }
  .card-row:last-child { margin-bottom: 0; }
  .card-row .label {
    display: block;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-size: var(--fs-sm);
    letter-spacing: 0.01em;
  }
  .card-row .value {
    color: var(--text);
    padding-left: 0;
  }
  /* 카드 내부 리스트 — 명확한 들여쓰기 */
  .card-row ul {
    margin: 6px 0 0 0;
    padding-left: 24px;
    list-style: disc;
  }
  .card-row ul li {
    margin-bottom: 4px;
    line-height: var(--lh-base);
    color: var(--text);
  }
  .card-row ul li:last-child { margin-bottom: 0; }

  /* ═══════════════ Changelog grid ═══════════════ */
  .changelog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
  .changelog-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    background: var(--bg-secondary);
  }
  .changelog-card h4 {
    margin: 0 0 12px;
    font-size: var(--fs-sm);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
  }
  .changelog-card.added h4 { color: var(--success); }
  .changelog-card.changed h4 { color: var(--info); }
  .changelog-card.fixed h4 { color: var(--warning); }
  .changelog-card.removed h4 { color: var(--danger); }
  .changelog-card ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .changelog-card li {
    font-size: var(--fs-sm);
    color: var(--text);
    padding: 8px 0;
    line-height: var(--lh-base);
    border-bottom: 1px dashed var(--border);
  }
  .changelog-card li:last-child { border-bottom: 0; padding-bottom: 0; }
  .changelog-card li:first-child { padding-top: 0; }
  .changelog-card code {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.88em;
    border: 1px solid var(--border);
  }

  /* ═══════════════ Next steps ═══════════════ */
  .next-steps {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .next-steps li {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 10px 0;
    font-size: var(--fs-base);
    color: var(--text);
    line-height: var(--lh-base);
    border-bottom: 1px dashed var(--border);
  }
  .next-steps li:last-child { border-bottom: 0; }
  .next-steps li::before {
    content: '☐';
    color: var(--text-muted);
    font-family: monospace;
    flex-shrink: 0;
    margin-top: 1px;
  }

<script>
(function() {
  'use strict';

  const dataEl = document.getElementById('dev-notes-data');
  let data;
  try {
    data = JSON.parse(dataEl.textContent);
  } catch (e) {
    console.error('Failed to parse dev notes data:', e);
    data = { project: 'Unknown', entries: [] };
  }

  // Initialize mermaid
  if (window.mermaid) {
    mermaid.initialize({
      startOnLoad: false,
      theme: document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default',
      flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
      fontFamily: 'Pretendard, sans-serif'
    });
  }

  // Set project
  document.getElementById('sidebar-project').textContent = data.project || 'Project';
  document.title = (data.project || 'Project') + ' — Develop Note';

  // Stats
  document.getElementById('stat-days').textContent = data.entries.length;
  let featureCount = 0, promptCount = 0;
  data.entries.forEach(e => {
    featureCount += (e.features || []).length;
    promptCount += (e.prompts || []).length;
  });
  document.getElementById('stat-features').textContent = featureCount;
  document.getElementById('stat-prompts').textContent = promptCount;

  if (data.entries.length > 0) {
    const dates = data.entries.map(e => e.date).sort();
    document.getElementById('last-updated').textContent = 'Last: ' + dates[dates.length - 1];
  }

  // Theme handling
  const themeToggle = document.getElementById('theme-toggle');
  const savedTheme = localStorage.getItem('devnote-theme') || 'light';
  applyTheme(savedTheme);
  themeToggle.onclick = () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('devnote-theme', next);
  };
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    themeToggle.textContent = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    document.getElementById('hljs-light').disabled = theme === 'dark';
    document.getElementById('hljs-dark').disabled = theme !== 'dark';
    if (window.mermaid) {
      mermaid.initialize({
        startOnLoad: false,
        theme: theme === 'dark' ? 'dark' : 'default',
        flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
        fontFamily: 'Pretendard, sans-serif'
      });
      // Re-render existing diagrams if any
      document.querySelectorAll('.mermaid-rendered').forEach(el => {
        const src = el.dataset.mermaidSrc;
        if (src) {
          el.classList.remove('mermaid-rendered');
          el.removeAttribute('data-processed');
          el.innerHTML = src;
          renderMermaid(el);
        }
      });
    }
  }

  // Sort entries newest first
  data.entries.sort((a, b) => b.date.localeCompare(a.date));

  let currentTab = 'functions';
  let currentFeatureId = null;
  let currentFuncName = null;
  let currentFuncCat = 'all';

  // ── 함수 카탈로그 로드 (별도 inline JSON)
  let functionsCatalog = { functions: [], categories: {}, total_functions: 0 };
  try {
    const _fcEl = document.getElementById('functions-catalog');
    if (_fcEl && _fcEl.textContent.trim()) {
      functionsCatalog = JSON.parse(_fcEl.textContent);
    }
  } catch (e) {
    console.warn('functions-catalog 파싱 실패', e);
  }

  // Tab switching
  document.querySelectorAll('.sidebar-tab').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTab = btn.dataset.tab;
      renderSidebar(document.getElementById('search-input').value);
    };
  });

  function renderSidebar(filter) {
    const list = document.getElementById('sidebar-list');
    list.innerHTML = '';
    filter = (filter || '').toLowerCase().trim();

    if (currentTab === 'features') {
      data.entries.forEach((entry, dateIdx) => {
        const features = (entry.features || []).filter(f => {
          if (!filter) return true;
          const hay = [f.title, f.context, f.implementation, (f.tags||[]).join(' '), entry.mainTask].join(' ').toLowerCase();
          return hay.includes(filter);
        });
        if (features.length === 0 && filter) return;

        const group = document.createElement('div');
        group.className = 'date-group';
        const header = document.createElement('div');
        header.className = 'date-header';
        header.innerHTML = `
          <svg class="date-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span class="date-label">${escapeHtml(entry.date)}${entry.mainTask ? ' · ' + escapeHtml(entry.mainTask) : ''}</span>
          <span class="date-count">${features.length}</span>
        `;
        header.onclick = () => group.classList.toggle('collapsed');
        group.appendChild(header);

        const ul = document.createElement('ul');
        ul.className = 'feature-list';
        features.forEach(f => {
          const li = document.createElement('li');
          li.className = 'feature-item';
          li.dataset.featureId = f.id;
          li.innerHTML = `
            <span class="feature-type-badge ${cssClass(f.type||'chore')}">${escapeHtml(f.type||'chore')}</span>
            <span class="feature-title-text">${escapeHtml(f.title)}</span>
          `;
          li.onclick = () => selectFeature(entry, f);
          ul.appendChild(li);
        });
        group.appendChild(ul);
        list.appendChild(group);
      });
    } else if (currentTab === 'functions') {
      // Render functions panel
      const panel = document.createElement('div');
      panel.className = 'functions-panel';
      const allFuncs = functionsCatalog.functions || [];

      if (allFuncs.length === 0) {
        panel.innerHTML = '<p style="color:var(--text-muted);font-size:13px;padding:20px 0;line-height:1.6;">함수 카탈로그가 비어있습니다.<br><br><code>extract_functions.py</code>를 실행하세요.</p>';
        list.appendChild(panel);
        return;
      }

      // 카테고리 필터 UI
      const cats = functionsCatalog.categories || {};
      const allCount = Object.values(cats).reduce((a, b) => a + b, 0);
      const filterRow = document.createElement('div');
      filterRow.className = 'functions-filter';
      const catOrder = ['all', 'production', 'internal', 'test', 'migration', 'cleanup', 'legacy'];
      catOrder.forEach(cat => {
        const count = cat === 'all' ? allCount : (cats[cat] || 0);
        if (cat !== 'all' && count === 0) return;
        const chip = document.createElement('button');
        chip.className = 'func-cat-chip' + (currentFuncCat === cat ? ' active' : '');
        chip.innerHTML = `${cat}<span class="count">(${count})</span>`;
        chip.onclick = () => {
          currentFuncCat = cat;
          renderSidebar(document.getElementById('search-input').value);
        };
        filterRow.appendChild(chip);
      });
      panel.appendChild(filterRow);

      // 필터링
      const filtered = allFuncs.filter(f => {
        if (currentFuncCat !== 'all' && f.category !== currentFuncCat) return false;
        if (!filter) return true;
        const hay = [f.name, f.description, f.file, (f.triggers||[]).map(t => t.description).join(' ')].join(' ').toLowerCase();
        return hay.includes(filter);
      });

      // 파일별 그룹화
      const byFile = {};
      filtered.forEach(f => {
        const key = f.file.replace(/^apps_script\//, '🛠 ').replace(/공급기업_관리\.html/, '🖥 공급사').replace(/신청기업_장비신청\.html/, '📝 신청자').replace(/^assets\//, '🎨 ').replace(/\.gs|\.js|\.html/g, '');
        if (!byFile[key]) byFile[key] = [];
        byFile[key].push(f);
      });

      Object.keys(byFile).sort().forEach(fileKey => {
        const label = document.createElement('div');
        label.className = 'functions-group-label';
        label.textContent = fileKey + ' (' + byFile[fileKey].length + ')';
        panel.appendChild(label);

        byFile[fileKey].forEach(f => {
          const row = document.createElement('div');
          row.className = 'func-item' + (currentFuncName === f.name + '@' + f.file ? ' active' : '');
          const catBadge = f.category && f.category !== 'production'
            ? `<span class="func-cat-badge cat-${f.category}">${f.category[0].toUpperCase()}</span>`
            : '';
          row.innerHTML = `
            <span class="func-name">${escapeHtml(f.name)}</span>
            <span class="func-desc-mini">${escapeHtml(f.description || '')}</span>
            ${catBadge}
          `;
          row.onclick = () => selectFunction(f);
          panel.appendChild(row);
        });
      });

      if (filtered.length === 0) {
        const empty = document.createElement('p');
        empty.style.cssText = 'color:var(--text-muted);font-size:12px;padding:16px 0;text-align:center;';
        empty.textContent = '일치하는 함수 없음';
        panel.appendChild(empty);
      }

      list.appendChild(panel);
      return;
    } else if (currentTab === 'prompts') {
      // Render prompts panel
      const panel = document.createElement('div');
      panel.className = 'prompts-panel';

      const allPrompts = [];
      data.entries.forEach(e => (e.prompts || []).forEach(p => {
        allPrompts.push({ ...p, _date: e.date, _entry: e });
      }));

      if (allPrompts.length === 0) {
        panel.innerHTML = '<p style="color:var(--text-muted);font-size:13px;padding:20px 0;line-height:1.6;">아직 저장된 프롬프트가 없습니다.<br><br>매일 작업 중 /devnote-prompt 명령어로 잘 통한 프롬프트를 기록해보세요.</p>';
      } else {
        const filtered = allPrompts.filter(p => {
          if (!filter) return true;
          return [p.label, p.prompt, p.lesson].join(' ').toLowerCase().includes(filter);
        });

        const goodPrompts = filtered.filter(p => p.verdict === 'good');
        const badPrompts = filtered.filter(p => p.verdict === 'bad');
        const neutralPrompts = filtered.filter(p => !p.verdict || p.verdict === 'neutral');

        function appendGroup(title, prompts) {
          if (prompts.length === 0) return;
          const h = document.createElement('h3');
          h.textContent = title + ' (' + prompts.length + ')';
          panel.appendChild(h);
          prompts.forEach(p => {
            const card = document.createElement('div');
            card.className = 'mini-prompt-card verdict-' + cssClass(p.verdict || 'neutral');
            card.innerHTML = `
              <div class="label">${escapeHtml(p.label || '(라벨 없음)')} <span style="font-weight:400;color:var(--text-faint);font-size:10px;">· ${escapeHtml(p._date || '')}</span></div>
              <div class="preview">${escapeHtml((p.prompt || '').substring(0, 120))}</div>
            `;
            card.onclick = () => showPromptDetail(p);
            panel.appendChild(card);
          });
        }
        appendGroup('✅ 잘 통한 프롬프트', goodPrompts);
        appendGroup('🔁 참고 프롬프트', neutralPrompts);
        appendGroup('❌ 잘 안 통한 프롬프트', badPrompts);
      }
      list.appendChild(panel);
    }
  }

  function selectFeature(entry, feature) {
    currentFeatureId = feature.id;
    document.querySelectorAll('.feature-item').forEach(el => {
      el.classList.toggle('active', el.dataset.featureId === feature.id);
    });
    renderContent(entry, feature);
    if (window.innerWidth <= 768) {
      document.querySelector('.sidebar').classList.remove('open');
    }
    document.querySelector('.main').scrollTop = 0;
  }

  function selectFunction(func) {
    currentFuncName = func.name + '@' + func.file;
    // 사이드바 다시 그려서 active 상태 반영
    document.querySelectorAll('.func-item').forEach(el => el.classList.remove('active'));
    // 메인 영역에 함수 상세 표시
    const content = document.getElementById('content');
    const catLabels = {
      production: '운영', internal: '내부 헬퍼', test: '테스트',
      migration: '마이그레이션', cleanup: '정리', legacy: 'Legacy'
    };
    const catLabel = catLabels[func.category] || func.category;
    const triggersHtml = (func.triggers || []).length === 0
      ? '<div class="func-empty">UI 또는 doPost 에서 직접 호출되지 않음 (다른 함수에서만 호출)</div>'
      : (func.triggers || []).map(t => `
        <div class="func-trigger-row">
          <span class="trigger-type">${escapeHtml(t.type || '')}</span>
          ${escapeHtml(t.description || '')}
          ${t.page ? `<span style="color:var(--text-faint);font-size:11px;margin-left:8px;">📄 ${escapeHtml(t.page)}${t.line ? ':' + t.line : ''}</span>` : ''}
        </div>
      `).join('');
    const callersHtml = (func.callers || []).length === 0
      ? '<div class="func-empty">호출되지 않음 (또는 entry point)</div>'
      : (func.callers || []).slice(0, 10).map(c => `
        <div class="func-caller-row">
          <span class="caller-file">${escapeHtml(c.file)}:${c.line}</span>
          ${escapeHtml(c.snippet || '')}
        </div>
      `).join('') + (func.callers_more ? `<div class="func-empty">… 외 ${func.callers_more}개 호출처</div>` : '');

    content.innerHTML = `
      <div class="feature-header">
        <div class="breadcrumb">
          <span class="breadcrumb-item">${escapeHtml(data.project)}</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-item">함수 사전</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-item">${escapeHtml(catLabel)}</span>
        </div>
        <h1 class="func-detail-name">${escapeHtml(func.name)}()</h1>
        <div class="func-detail-meta">
          <span><code>${escapeHtml(func.file)}:${func.line}</code></span>
          <span>${escapeHtml(catLabel)}</span>
          ${func.is_async ? '<span style="color:var(--accent);font-weight:600;">async</span>' : ''}
        </div>
      </div>
      <section class="func-section">
        <h3>📌 기능 설명</h3>
        <div class="func-description-box">${escapeHtml(func.description || '(설명 없음)')}</div>
      </section>
      <section class="func-section">
        <h3>📝 시그니처</h3>
        <pre class="code-snippet"><code>${escapeHtml(func.signature || '')}</code></pre>
      </section>
      <section class="func-section">
        <h3>🖱 호출 트리거 (사용자 동작 / 라우팅)</h3>
        ${triggersHtml}
      </section>
      <section class="func-section">
        <h3>↪ 이 함수를 호출하는 곳 (${(func.callers || []).length}${func.callers_more ? '+' : ''})</h3>
        ${callersHtml}
      </section>
      ${func.body_preview ? `
        <section class="func-section">
          <h3>👁 본문 미리보기</h3>
          <pre class="code-snippet"><code>${escapeHtml(func.body_preview)}</code></pre>
        </section>
      ` : ''}
    `;
    window.scrollTo(0, 0);
  }

  function showPromptDetail(prompt) {
    const content = document.getElementById('content');
    const verdictEmoji = { good: '✅', bad: '❌', neutral: '🔁' };
    const verdictLabel = { good: '잘 통한 프롬프트', bad: '잘 안 통한 프롬프트', neutral: '참고 프롬프트' };
    const v = prompt.verdict || 'neutral';

    content.innerHTML = `
      <div class="feature-header">
        <div class="breadcrumb">
          <span class="breadcrumb-item">${escapeHtml(data.project)}</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-item">Prompt Library</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-item">${escapeHtml(prompt._date || '')}</span>
        </div>
        <h1 class="feature-h1">${verdictEmoji[v]} ${escapeHtml(prompt.label || '(라벨 없음)')}</h1>
        <div class="meta-row">
          <span style="font-weight:600;color:var(--text-secondary);">${verdictLabel[v]}</span>
          ${prompt._date ? `<span>${escapeHtml(prompt._date)}</span>` : ''}
        </div>
      </div>
      <section class="section">
        <div class="section-title">프롬프트 원문</div>
        <div class="prompt-text">${escapeHtml(prompt.prompt || '')}</div>
      </section>
      ${prompt.lesson ? `
        <section class="section">
          <div class="section-title">교훈 · 메모</div>
          <div class="prose">${md(prompt.lesson)}</div>
        </section>
      ` : ''}
      ${prompt.context ? `
        <section class="section">
          <div class="section-title">상황</div>
          <div class="prose">${md(prompt.context)}</div>
        </section>
      ` : ''}
    `;
    document.querySelector('.main').scrollTop = 0;
  }

  function md(s) {
    if (!s) return '';
    return marked.parse(s, { breaks: true });
  }

  function renderContent(entry, feature) {
    const content = document.getElementById('content');

    let html = `
      <div class="feature-header">
        <div class="breadcrumb">
          <span class="breadcrumb-item">${escapeHtml(data.project)}</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-item">${escapeHtml(entry.date)}</span>
          <span class="breadcrumb-sep">/</span>
          <span class="breadcrumb-item">${escapeHtml(entry.mainTask || '')}</span>
        </div>
        <h1 class="feature-h1">${escapeHtml(feature.title)}</h1>
        <div class="meta-row">
          <span class="feature-type-badge ${cssClass(feature.type||'chore')}">${escapeHtml(feature.type||'chore')}${feature.scope?'('+escapeHtml(feature.scope)+')':''}</span>
          <span class="status-badge ${cssClass((feature.status||'completed').replace(/\s+/g,'-'))}">${escapeHtml(feature.status||'completed')}</span>
          ${(feature.tags && feature.tags.length) ? `<div class="tags-row">${feature.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
        </div>
      </div>
    `;

    const isFirstFeatureOfDay = (entry.features || [])[0] && (entry.features[0].id === feature.id);

    // TL;DR — only on first feature of the day
    if (isFirstFeatureOfDay && entry.tldr) {
      html += `<section class="section"><div class="section-title">📌 TL;DR</div><div class="prose">${md(entry.tldr)}</div></section>`;
    }

    // Code structure diagram — only on first feature of the day
    if (isFirstFeatureOfDay && entry.codeDiagram) {
      html += `<section class="section">
        <div class="section-title">📊 Code Structure (자동 분석)</div>
        <div class="mermaid-container" id="mermaid-${escapeAttr(feature.id)}" data-mermaid-src="${escapeAttr(entry.codeDiagram)}">${escapeHtml(entry.codeDiagram)}</div>
      </section>`;
    }

    if (feature.context) {
      html += `<section class="section"><div class="section-title">📋 Context · 왜 (배경)</div><div class="prose">${md(feature.context)}</div></section>`;
    }
    if (feature.implementation) {
      html += `<section class="section"><div class="section-title">🔨 Implementation · 무엇을 어떻게</div><div class="prose">${md(feature.implementation)}</div></section>`;
    }

    if (feature.codeSnippets && feature.codeSnippets.length) {
      html += `<section class="section"><div class="section-title">💻 Key Code (기술 구현)</div>`;
      feature.codeSnippets.forEach((sn, i) => {
        const code = escapeHtml(sn.code || '');
        // lang goes into a CSS class — restrict to safe characters only
        const lang = (sn.lang || 'plaintext').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 30) || 'plaintext';
        html += `
          <div class="code-snippet">
            <div class="code-snippet-header">
              <span>${escapeHtml(sn.file || '')} · ${escapeHtml(lang)}</span>
              <button class="copy-btn" data-feat-id="${escapeAttr(feature.id)}" data-code-idx="${i}">Copy</button>
            </div>
            <pre><code class="language-${lang}">${code}</code></pre>
            ${sn.caption ? `<div class="code-snippet-caption">${escapeHtml(sn.caption)}</div>` : ''}
          </div>
        `;
      });
      html += `</section>`;
    }

    if (feature.decisions && feature.decisions.length) {
      html += `<section class="section"><div class="section-title">📐 Architecture Decisions (ADR)</div>`;
      feature.decisions.forEach(d => {
        html += `
          <div class="decision-card">
            <div class="card-title">📐 ${escapeHtml(d.title || 'Decision')}</div>
            ${d.context ? `<div class="card-row"><span class="label">Context</span><div class="value">${escapeHtml(d.context)}</div></div>` : ''}
            ${(d.options && d.options.length) ? `<div class="card-row"><span class="label">Options Considered</span><ul>${d.options.map(o=>`<li>${escapeHtml(o)}</li>`).join('')}</ul></div>` : ''}
            ${d.chosen ? `<div class="card-row"><span class="label">Chosen</span><div class="value"><strong>${escapeHtml(d.chosen)}</strong></div></div>` : ''}
            ${d.rationale ? `<div class="card-row"><span class="label">Rationale</span><div class="value">${escapeHtml(d.rationale)}</div></div>` : ''}
            ${d.consequences ? `<div class="card-row"><span class="label">Consequences</span><div class="value">${escapeHtml(d.consequences)}</div></div>` : ''}
          </div>
        `;
      });
      html += `</section>`;
    }

    if (feature.problems && feature.problems.length) {
      html += `<section class="section"><div class="section-title">🐛 Problems & Solutions</div>`;
      feature.problems.forEach(p => {
        html += `
          <div class="problem-card">
            <div class="card-title">🐛 ${escapeHtml(p.description || 'Problem')}</div>
            ${p.cause ? `<div class="card-row"><span class="label">Root Cause</span><div class="value">${escapeHtml(p.cause)}</div></div>` : ''}
            ${p.solution ? `<div class="card-row"><span class="label">Solution</span><div class="value">${escapeHtml(p.solution)}</div></div>` : ''}
            ${p.prevention ? `<div class="card-row"><span class="label">Prevention</span><div class="value">${escapeHtml(p.prevention)}</div></div>` : ''}
          </div>
        `;
      });
      html += `</section>`;
    }

    if (feature.learnings && feature.learnings.length) {
      html += `<section class="section"><div class="section-title">💡 Learnings</div><div class="prose"><ul>${feature.learnings.map(l=>`<li>${escapeHtml(l)}</li>`).join('')}</ul></div></section>`;
    }

    // Day-level sections — only on first feature of the day
    if (isFirstFeatureOfDay) {
      // Prompts library section
      if (entry.prompts && entry.prompts.length) {
        html += `<section class="section"><div class="section-title">🎯 Prompt Library (오늘의 프롬프트)</div>`;
        entry.prompts.forEach(p => {
          const v = p.verdict || 'neutral';
          const vEmoji = { good: '✅', bad: '❌', neutral: '🔁' };
          const vLabel = { good: '잘 통한 프롬프트', bad: '잘 안 통한 프롬프트', neutral: '참고 프롬프트' };
          html += `
            <div class="prompt-card verdict-${cssClass(v)}">
              <div class="prompt-header">
                <span class="prompt-verdict-icon">${vEmoji[v]}</span>
                <span>${vLabel[v]}</span>
                ${p.label ? `<span>·</span><span class="prompt-label">${escapeHtml(p.label)}</span>` : ''}
              </div>
              <div class="prompt-text">${escapeHtml(p.prompt || '')}</div>
              ${p.lesson ? `<div class="prompt-lesson"><strong>교훈:</strong> ${escapeHtml(p.lesson)}</div>` : ''}
            </div>
          `;
        });
        html += `</section>`;
      }

      // References
      if (entry.references && entry.references.length) {
        html += `<section class="section"><div class="section-title">📚 References & 외부 학습</div>`;
        entry.references.forEach(r => {
          html += `
            <a class="ref-item" href="${escapeAttr(r.url || '#')}" target="_blank" rel="noopener">
              <div class="ref-title">${escapeHtml(r.title || r.url || 'Untitled')}</div>
              ${r.url ? `<div class="ref-url">${escapeHtml(r.url)}</div>` : ''}
              ${r.note ? `<div class="ref-note">${escapeHtml(r.note)}</div>` : ''}
              ${(r.tags && r.tags.length) ? `<div class="ref-tags">${r.tags.map(t=>`<span class="ref-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
            </a>
          `;
        });
        html += `</section>`;
      }

      // Changelog
      const cl = entry.changelog || {};
      const hasChangelog = ['added','changed','fixed','removed'].some(k => (cl[k]||[]).length);
      if (hasChangelog) {
        html += `<section class="section"><div class="section-title">📋 Changes Summary</div><div class="changelog-grid">`;
        ['added','changed','fixed','removed'].forEach(k => {
          if ((cl[k]||[]).length) {
            html += `<div class="changelog-card ${k}"><h4>${k}</h4><ul>${cl[k].map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></div>`;
          }
        });
        html += `</div></section>`;
      }

      // Next steps
      if (entry.nextSteps && entry.nextSteps.length) {
        html += `<section class="section"><div class="section-title">⏭️ Next Steps</div><ul class="next-steps">${entry.nextSteps.map(s=>`<li>${escapeHtml(s)}</li>`).join('')}</ul></section>`;
      }

      // Claude hints + reusable patterns
      if (entry.claudeHints || (entry.reusablePatterns && entry.reusablePatterns.length)) {
        html += `<div class="claude-hints">`;
        html += `<h3>🤖 For Future Claude Code Sessions</h3>`;
        if (entry.claudeHints) {
          html += `<div class="claude-hint-body">${md(entry.claudeHints)}</div>`;
        }
        if (entry.reusablePatterns && entry.reusablePatterns.length) {
          html += `<div class="claude-patterns-title">Reusable patterns:</div>`;
          html += `<ul class="claude-patterns">`;
          entry.reusablePatterns.forEach(p => {
            html += `
              <li>
                <span class="pattern-name">${escapeHtml(p.name || '')}</span>
                <span class="pattern-desc"> — ${escapeHtml(p.description || '')}</span>
                ${p.file ? `<span class="pattern-file">${escapeHtml(p.file)}</span>` : ''}
              </li>
            `;
          });
          html += `</ul>`;
        }
        html += `</div>`;
      }
    }

    content.innerHTML = html;

    // Highlight code
    content.querySelectorAll('pre code').forEach(b => {
      try { hljs.highlightElement(b); } catch(e) {}
    });

    // Render mermaid diagrams
    content.querySelectorAll('.mermaid-container').forEach(el => renderMermaid(el));

    // Copy buttons
    content.querySelectorAll('.copy-btn').forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.dataset.codeIdx);
        const code = feature.codeSnippets[idx].code;
        navigator.clipboard.writeText(code).then(() => {
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = 'Copy', 1500);
        });
      };
    });
  }

  function renderMermaid(el) {
    if (!window.mermaid || el.classList.contains('mermaid-rendered')) return;
    const src = el.dataset.mermaidSrc || el.textContent;
    el.dataset.mermaidSrc = src;
    try {
      const id = 'mermaid-svg-' + Math.random().toString(36).slice(2, 9);
      mermaid.render(id, src).then(({ svg }) => {
        el.innerHTML = svg;
        el.classList.add('mermaid-rendered');
      }).catch(err => {
        el.innerHTML = '<pre style="color:var(--text-muted);font-size:12px;text-align:left;">' + escapeHtml(src) + '</pre>';
        console.error('Mermaid render error:', err);
      });
    } catch (e) {
      console.error(e);
    }
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
  }
  function escapeAttr(s) { return escapeHtml(s); }
  // Sanitize for CSS class names — only alphanumeric, hyphen, underscore
  function cssClass(s) {
    if (s == null) return '';
    return String(s).replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 40);
  }

  // Search
  document.getElementById('search-input').addEventListener('input', (e) => {
    renderSidebar(e.target.value);
  });

  renderSidebar();

  // Auto-select most recent feature
  if (data.entries.length > 0 && data.entries[0].features && data.entries[0].features.length > 0) {
    selectFeature(data.entries[0], data.entries[0].features[0]);
  }
})();
</script>
</body>
</html>
